<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MedReport</title>
  <meta name="description" content="Login to MedReport — your smart medical lab report analyzer.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Design Tokens ─────────────────────────────── */
    :root {
      --bg: #080c14; --surface: #0e1520; --surface-2: #131c2a;
      --border: #1a2535; --border-2: #1f2d40;
      --text: #dde4ef; --muted: #5c6f88;
      --accent: #00c9a7; --accent-rgb: 0,201,167;
      --danger: #ff4757; --ok: #26de81;
      --shadow: 0 8px 32px rgba(0,0,0,.45); --r: 16px;
    }
    [data-theme="light"] {
      --bg: #f0f4f9; --surface: #ffffff; --surface-2: #f5f7fa;
      --border: rgba(0,0,0,.08); --border-2: rgba(0,0,0,.13);
      --text: #1a2333; --muted: #7a92a8;
      --accent: #00a88c; --accent-rgb: 0,168,140;
      --danger: #e0293a; --ok: #189e5a;
      --shadow: 0 8px 32px rgba(0,0,0,.08);
    }

    /* ── Reset & Base ──────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      transition: background .3s, color .3s;
    }

    /* ── Card ──────────────────────────────────────── */
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 44px 36px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
      animation: fadeUp .5s ease;
    }

    /* ── Logo ──────────────────────────────────────── */
    .brand { text-align: center; margin-bottom: 32px; }
    .brand-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--accent), #45aaf2);
      border-radius: 14px;
      display: inline-grid; place-items: center;
      font-weight: 700; color: #fff; font-size: 22px;
      margin-bottom: 14px;
      box-shadow: 0 4px 20px rgba(var(--accent-rgb), .35);
    }
    .brand h1 { font-size: 26px; font-weight: 700; }
    .brand h1 span { color: var(--accent); }
    .brand p { color: var(--muted); font-size: 14px; margin-top: 4px; }

    /* ── Form ──────────────────────────────────────── */
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; margin-bottom: 7px;
      font-weight: 500; font-size: 13px; color: var(--muted);
      letter-spacing: .3px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-2);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      background: var(--surface-2);
      color: var(--text);
      transition: border-color .2s, background .2s, box-shadow .2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--bg);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), .12);
    }
    .form-group input::placeholder { color: var(--muted); opacity: .6; }

    /* ── Button ────────────────────────────────────── */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: transform .15s, opacity .15s, box-shadow .15s;
      box-shadow: 0 4px 16px rgba(var(--accent-rgb), .35);
      margin-top: 4px;
    }
    .btn-primary:hover { transform: translateY(-2px); opacity: .92; }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── Messages ──────────────────────────────────── */
    .alert {
      padding: 11px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 13px;
      font-weight: 500;
      display: none;
    }
    .alert-error {
      background: rgba(255,71,87,.08);
      color: var(--danger);
      border: 1px solid rgba(255,71,87,.2);
    }

    /* ── Footer ────────────────────────────────────── */
    .auth-footer {
      text-align: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
    }
    .auth-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .auth-footer a:hover { text-decoration: underline; }

    /* ── Animation ─────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ────────────────────────────────── */
    @media (max-width: 480px) {
      .auth-card { padding: 32px 24px 28px; }
      .brand-icon { width: 44px; height: 44px; font-size: 18px; }
      .brand h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

  <div class="auth-card">
    <div class="brand">
      <div class="brand-icon">M</div>
      <h1>Med<span>Report</span></h1>
      <p>Smart Lab Report Analyzer</p>
    </div>

    <div class="alert alert-error" id="error-msg"></div>

    <form id="login-form" autocomplete="on">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn-primary" id="login-btn">Login</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/signup">Sign up</a>
    </div>
  </div>

  <script>
    /* ── Restore saved theme ── */
    (function() {
      try {
        const t = localStorage.getItem('medreport-theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
      } catch(e) {}
    })();

    /* ── Form handler ── */
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('error-msg');

      btn.disabled = true;
      btn.textContent = 'Logging in…';
      err.style.display = 'none';

      try {
        const res = await fetch('/login', { method: 'POST', body: new FormData(e.target) });
        const data = await res.json();

        if (data.success) {
          window.location.href = data.redirect;
        } else {
          err.textContent = data.error;
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Login';
        }
      } catch {
        err.textContent = 'Could not connect to server. Please try again.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
