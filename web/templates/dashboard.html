<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — MedReport</title>
  <meta name="description" content="View and manage your analyzed medical reports.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Design Tokens ─────────────────────────────── */
    :root {
      --bg: #080c14; --surface: #0e1520; --surface-2: #131c2a;
      --border: #1a2535; --border-2: #1f2d40;
      --text: #dde4ef; --muted: #5c6f88;
      --accent: #00c9a7; --accent-rgb: 0,201,167;
      --danger: #ff4757; --ok: #26de81; --caution: #ffd166;
      --shadow: 0 4px 20px rgba(0,0,0,.4); --r: 14px;
    }
    [data-theme="light"] {
      --bg: #f0f4f9; --surface: #ffffff; --surface-2: #f5f7fa;
      --border: rgba(0,0,0,.08); --border-2: rgba(0,0,0,.13);
      --text: #1a2333; --muted: #7a92a8;
      --accent: #00a88c; --accent-rgb: 0,168,140;
      --danger: #e0293a; --ok: #189e5a; --caution: #c89200;
      --shadow: 0 4px 20px rgba(0,0,0,.08);
    }

    /* ── Reset & Base ──────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 10px; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      transition: background .3s, color .3s;
    }

    /* ── Header ────────────────────────────────────── */
    header {
      padding: 0 28px;
      height: 58px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(8,12,20,.92);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background .3s;
    }
    [data-theme="light"] header { background: rgba(240,244,249,.92); }

    .logo {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), #45aaf2);
      border-radius: 9px;
      display: grid; place-items: center;
      font-weight: 700; color: #fff; font-size: 14px;
      flex-shrink: 0;
    }
    header h1 { font-size: 15px; font-weight: 600; flex: 1; }
    header h1 span { color: var(--muted); font-weight: 400; }

    .header-actions { display: flex; align-items: center; gap: 10px; }

    .logout-btn {
      padding: 7px 16px;
      border-radius: 8px;
      background: rgba(255,71,87,.1);
      border: 1px solid rgba(255,71,87,.2);
      color: var(--danger);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: all .2s;
    }
    .logout-btn:hover { background: rgba(255,71,87,.18); }

    /* ── Theme Toggle ─────────────────────────────── */
    .theme-btn {
      width: 34px; height: 34px;
      border: 1px solid var(--border-2);
      border-radius: 9px;
      background: var(--surface-2);
      cursor: pointer;
      display: grid; place-items: center;
      color: var(--muted);
      transition: all .2s;
    }
    .theme-btn:hover { border-color: var(--accent); color: var(--accent); }
    .theme-btn svg { width: 16px; height: 16px; }
    .icon-moon { display: block; } .icon-sun { display: none; }
    [data-theme="light"] .icon-moon { display: none; }
    [data-theme="light"] .icon-sun { display: block; }

    /* ── Container ─────────────────────────────────── */
    .container { max-width: 1060px; margin: 0 auto; padding: 40px 24px 80px; }

    /* ── Top Bar ───────────────────────────────────── */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      gap: 12px;
    }
    .top-bar h2 { font-size: 22px; font-weight: 600; }
    .new-btn {
      padding: 10px 22px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      font-family: inherit;
      text-decoration: none;
      cursor: pointer;
      transition: transform .15s, opacity .15s;
      box-shadow: 0 4px 16px rgba(var(--accent-rgb), .3);
      white-space: nowrap;
    }
    .new-btn:hover { transform: translateY(-2px); opacity: .92; }

    /* ── Reports Grid ──────────────────────────────── */
    .reports-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    /* ── Report Card ───────────────────────────────── */
    .report-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 22px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: transform .2s, box-shadow .2s, background .3s;
      animation: fadeUp .4s ease backwards;
    }
    .report-card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,.5); }
    [data-theme="light"] .report-card:hover { box-shadow: 0 8px 30px rgba(0,0,0,.12); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .card-filename {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
      word-break: break-word;
    }

    /* ── Health Badge ──────────────────────────────── */
    .health-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
      letter-spacing: .5px;
    }
    .badge-good { background: rgba(38,222,129,.1); color: var(--ok); }
    .badge-moderate { background: rgba(255,209,102,.1); color: var(--caution); }
    .badge-poor { background: rgba(255,71,87,.1); color: var(--danger); }

    /* ── Card Actions ──────────────────────────────── */
    .card-actions { display: flex; gap: 10px; }
    .card-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: all .2s;
    }
    .btn-view { background: var(--accent); color: #fff; }
    .btn-view:hover { opacity: .9; }
    .btn-dl {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border-2);
    }
    .btn-dl:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Empty State ───────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 52px; margin-bottom: 20px; display: block; }
    .empty-state h3 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; margin-bottom: 28px; }

    /* ── Animation ─────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ────────────────────────────────── */
    @media (max-width: 640px) {
      header { padding: 0 16px; }
      header h1 span { display: none; }
      .container { padding: 24px 16px 60px; }
      .top-bar { flex-direction: column; align-items: stretch; text-align: center; }
      .reports-grid { grid-template-columns: 1fr; }
      .card-actions { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="logo">M</div>
    <h1>MedReport <span>— Dashboard</span></h1>
    <div class="header-actions">
      <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <a href="/logout" class="logout-btn">Logout</a>
    </div>
  </header>

  <!-- ── Main ── -->
  <div class="container">
    <div class="top-bar">
      <h2>My Reports</h2>
      <a href="/analyze" class="new-btn">+ New Analysis</a>
    </div>

    {% if reports %}
    <div class="reports-grid">
      {% for report in reports %}
      <div class="report-card" data-delay="{{ loop.index0 }}">
        <div class="card-header">
          <div class="card-filename">{{ report.filename }}</div>
          <div class="health-badge {% if report.health_score >= 85 %}badge-good{% elif report.health_score >= 65 %}badge-moderate{% else %}badge-poor{% endif %}">
            {{ report.health_score }}/100
          </div>
        </div>
        <div class="card-actions">
          <button class="card-btn btn-view" onclick="viewReport('{{ report.id }}')">View Results</button>
          <a href="/download/{{ report.id }}" class="card-btn btn-dl">Download PDF</a>
        </div>
      </div>
      {% endfor %}
    </div>
    {% else %}
    <div class="empty-state">
      <span class="empty-icon">📋</span>
      <h3>No reports yet</h3>
      <p>Upload your first medical report to get started!</p>
      <a href="/analyze" class="new-btn">Start Analysis</a>
    </div>
    {% endif %}
  </div>

  <script>
    /* ── Theme ── */
    (function() {
      try {
        const t = localStorage.getItem('medreport-theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
      } catch(e) {}
    })();

    function toggleTheme() {
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      try { localStorage.setItem('medreport-theme', next); } catch(e) {}
    }

    /* ── Navigate to report ── */
    function viewReport(reportId) {
      window.location.href = '/analyze?report=' + reportId;
    }

    /* ── Stagger card animations ── */
    document.querySelectorAll('.report-card[data-delay]').forEach(card => {
      card.style.animationDelay = (parseInt(card.dataset.delay) * 0.06) + 's';
    });
  </script>
</body>
</html>
