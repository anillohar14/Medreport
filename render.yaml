services:
  - type: web
    name: medreport
    env: python
    plan: free
    buildCommand: apt-get update && apt-get install -y tesseract-ocr poppler-utils && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: SECRET_KEY
        value: change-this-in-production
      - key: FLASK_ENV
        value: production